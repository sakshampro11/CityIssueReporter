<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up | Lokally</title>
  <meta name="description" content="Create your Lokally account and start reporting city issues." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { font-family: 'Space Grotesk', sans-serif; }
    .font-space-grotesk { font-family: 'Space Grotesk', sans-serif !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-space-grotesk">
  <div class="flex w-full max-w-4xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100/80">
    <!-- Left Side Image -->
    <div class="hidden md:flex flex-col justify-center items-center bg-gray-50 w-1/2 p-4">
      <img src="assets/signup.png" alt="Sign Up Illustration"
        class="w-[32rem] h-[32rem] object-contain mx-auto"
        onerror="this.parentElement.classList.add('hidden')" />
    </div>
    <!-- Right Side Form -->
    <div class="flex-1 p-8">
      <div class="flex justify-end items-center gap-4 mb-4">
        <a href="landing.html" class="text-gray-600 hover:text-gray-800 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <a href="landing.html" class="text-3xl font-bold text-blue-500 mb-1 hover:text-blue-600 transition">Lokally</a>
      </div>

      <h2 class="text-2xl font-semibold text-gray-800 mb-1">Create an account</h2>
      <p class="text-gray-500 text-sm mb-4">Join the community. Report city issues. Make a difference.</p>

      <!-- Error / success banner -->
      <div id="formBanner" class="hidden mb-4 px-4 py-2 rounded-md text-sm font-medium"></div>

      <form id="signupForm" class="space-y-3">
        <!-- Name row -->
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">First Name</label>
            <input id="firstName" type="text" placeholder="First name"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required />
          </div>
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">Last Name</label>
            <input id="lastName" type="text" placeholder="Last name"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <!-- Email & Phone -->
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">Email</label>
            <input id="email" type="email" placeholder="you@example.com"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required />
          </div>
          <div class="flex-1">
            <label class="block text-sm text-gray-600 mb-1">Phone Number</label>
            <input id="phone" type="tel" placeholder="e.g. 9876543210"
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
          </div>
        </div>

        <!-- Address -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Address</label>
          <input id="address" type="text" placeholder="Your locality / neighbourhood"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Password</label>
          <input id="password" type="password" placeholder="Create a strong password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required />
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm text-gray-600 mb-1">Confirm Password</label>
          <input id="confirmPassword" type="password" placeholder="Re-enter your password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required />
          <p id="passwordError" class="text-red-500 text-sm mt-1 hidden">Passwords do not match.</p>
        </div>

        <!-- Terms -->
        <div class="flex items-center">
          <input type="checkbox" id="terms" class="mr-2" required />
          <label for="terms" class="text-sm text-gray-600">
            I agree to all the
            <a href="#" class="text-blue-500 underline">Terms</a> and
            <a href="#" class="text-blue-500 underline">Privacy Policy</a>
          </label>
        </div>

        <button id="submitBtn" type="submit"
          class="w-full bg-blue-500 text-white font-semibold py-2 rounded-md hover:bg-blue-600 transition mt-2 flex items-center justify-center gap-2">
          Create account
        </button>
        <p class="text-center text-sm text-gray-500">
          Already have an account?
          <a href="sign-in.html" class="text-blue-500 font-semibold">Sign in</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    const passwordInput        = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const passwordError        = document.getElementById('passwordError');
    const formBanner           = document.getElementById('formBanner');

    function checkPasswordMatch() {
      if (confirmPasswordInput.value && passwordInput.value !== confirmPasswordInput.value) {
        passwordError.classList.remove('hidden');
        return false;
      }
      passwordError.classList.add('hidden');
      return true;
    }

    passwordInput.addEventListener('input', checkPasswordMatch);
    confirmPasswordInput.addEventListener('input', checkPasswordMatch);

    function showBanner(message, type = 'error') {
      formBanner.textContent = message;
      formBanner.className = `mb-4 px-4 py-2 rounded-md text-sm font-medium ${
        type === 'success'
          ? 'bg-green-100 text-green-800 border border-green-300'
          : 'bg-red-100 text-red-800 border border-red-300'
      }`;
      formBanner.classList.remove('hidden');
    }

    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      if (!checkPasswordMatch()) return;

      const name     = `${document.getElementById('firstName').value.trim()} ${document.getElementById('lastName').value.trim()}`.trim();
      const email    = document.getElementById('email').value.trim();
      const phone    = document.getElementById('phone').value.trim();
      const address  = document.getElementById('address').value.trim();
      const password = passwordInput.value;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Creating account…';

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, phone, address, password })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('ch_token', data.token);
          localStorage.setItem('ch_user',  JSON.stringify(data.user));
          showBanner('Account created! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1200);
        } else {
          showBanner(data.message || 'Registration failed. Please try again.');
          btn.disabled    = false;
          btn.textContent = 'Create account';
        }
      } catch (err) {
        showBanner('Network error — is the server running?');
        btn.disabled    = false;
        btn.textContent = 'Create account';
      }
    });
  </script>
</body>
</html>
