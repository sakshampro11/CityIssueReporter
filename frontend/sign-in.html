<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign In | Lokally</title>
  <meta name="description" content="Sign in to your Lokally account." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html { font-family: 'Space Grotesk', sans-serif; }
    .font-space-grotesk { font-family: 'Space Grotesk', sans-serif !important; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-space-grotesk">
  <div class="flex w-full max-w-4xl bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100/80">
    <!-- Left: Sign In Form -->
    <div class="flex-1 p-10 flex flex-col justify-center">
      <div class="mb-8 flex items-center gap-4">
        <a href="landing.html" class="text-gray-600 hover:text-gray-800 transition">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
        </a>
        <a href="landing.html" class="text-4xl font-bold text-blue-500 hover:text-blue-600 transition">Lokally</a>
      </div>

      <h2 class="text-2xl font-semibold mb-1">Sign in</h2>
      <p class="text-gray-500 mb-6">Welcome back! Sign in to your dashboard.</p>

      <!-- Error / success banner -->
      <div id="formBanner" class="hidden mb-4 px-4 py-2 rounded-md text-sm font-medium"></div>

      <form id="signinForm" class="space-y-4">
        <div>
          <label class="block text-gray-700 mb-1" for="email">Email address</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@example.com"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            required
          />
        </div>

        <div>
          <label class="block text-gray-700 mb-1" for="password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Your password"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
            required
          />
        </div>

        <button
          id="submitBtn"
          type="submit"
          class="w-full bg-blue-500 text-white py-2 rounded-md font-semibold hover:bg-blue-600 transition flex items-center justify-center gap-2"
        >
          Sign in
        </button>

        <div class="text-center mt-2">
          <span class="text-gray-500">Don't have an account?</span>
          <a href="signup.html" class="text-blue-500 font-medium ml-1">Sign up</a>
        </div>
      </form>
    </div>

    <!-- Right: Illustration -->
    <div class="hidden md:flex flex-1 items-center justify-center bg-gray-50">
      <img src="assets/signin.png" alt="Sign In Illustration"
        class="w-[500px] h-[500px] object-contain"
        onerror="this.parentElement.classList.add('hidden')" />
    </div>
  </div>

  <script>
    const formBanner = document.getElementById('formBanner');

    function showBanner(message, type = 'error') {
      formBanner.textContent = message;
      formBanner.className = `mb-4 px-4 py-2 rounded-md text-sm font-medium ${
        type === 'success'
          ? 'bg-green-100 text-green-800 border border-green-300'
          : 'bg-red-100 text-red-800 border border-red-300'
      }`;
      formBanner.classList.remove('hidden');
    }

    document.getElementById('signinForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submitBtn');

      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          if (data.user.role === 'resolver') {
            showBanner('Access denied: Please sign in through the Resolver Portal.');
            btn.disabled    = false;
            btn.textContent = 'Sign in';
            localStorage.removeItem('ch_token');
            localStorage.removeItem('ch_user');
            return;
          }
          localStorage.setItem('ch_token', data.token);
          localStorage.setItem('ch_user',  JSON.stringify(data.user));
          showBanner('Login successful! Redirecting…', 'success');
          setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        } else {
          showBanner(data.message || 'Invalid email or password.');
          btn.disabled    = false;
          btn.textContent = 'Sign in';
        }
      } catch (err) {
        showBanner('Network error — is the server running?');
        btn.disabled    = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
